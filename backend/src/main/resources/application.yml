spring:
  application:
    name: alpha-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
  datasource:
    url: jdbc:postgresql://localhost:5432/alpha
    username: alpha
    password: alpha
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

alpha:
  storage:
    local:
      directory: ./data/video-uploads
  jwt:
    # Override with ALPHA_JWT_SECRET in production (min 32 chars)
    secret: ${ALPHA_JWT_SECRET:dev-alpha-jwt-secret-change-me-min-32-chars-required!!}
    expiration-ms: ${ALPHA_JWT_EXPIRATION_MS:86400000}

logging:
  level:
    org.springframework.web: INFO
